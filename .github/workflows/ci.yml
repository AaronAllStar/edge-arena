name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: edgearena
          POSTGRES_PASSWORD: edgearena
          POSTGRES_DB: edgearena_test
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-asyncio httpx
      - name: Lint
        run: ruff check app/
      - name: Typecheck
        run: mypy app/ --ignore-missing-imports
      - name: Test
        env:
          DATABASE_URL: postgresql+asyncpg://edgearena:edgearena@localhost:5432/edgearena_test
          REDIS_URL: redis://localhost:6379/1
          JWT_SECRET_KEY: test-secret
        run: pytest tests/ -v

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API
        run: docker build -f apps/api/Dockerfile --target api apps/api/
      - name: Build Worker
        run: docker build -f apps/api/Dockerfile --target worker apps/api/
