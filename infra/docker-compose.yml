services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: edgearena
      POSTGRES_PASSWORD: edgearena
      POSTGRES_DB: edgearena
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edgearena"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
      target: api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://edgearena:edgearena@postgres:5432/edgearena
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DEBUG: "true"
      CORS_ORIGINS: '["http://localhost:3000"]'
      JWT_SECRET_KEY: dev-secret-change-in-production
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ../apps/api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
      target: worker
    environment:
      DATABASE_URL: postgresql+asyncpg://edgearena:edgearena@postgres:5432/edgearena
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ../apps/api:/app

  beat:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
      target: beat
    environment:
      DATABASE_URL: postgresql+asyncpg://edgearena:edgearena@postgres:5432/edgearena
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      redis: { condition: service_healthy }

volumes:
  pgdata:
  redisdata:
